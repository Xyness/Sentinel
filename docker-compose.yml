name: sentinel

volumes:
  features-data:
  checkpoint-data:
  model-data:

services:

  # --- Infrastructure ---

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,srvr"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # --- Data Pipeline ---

  data-generator:
    build:
      context: .
      dockerfile: docker/Dockerfile-generator
    container_name: data-generator
    environment:
      - DATA_SOURCE=${DATA_SOURCE:-simulated}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=crypto-market
      - EVENT_FREQUENCY_SECONDS=1
      - ANOMALY_PROBABILITY=0.01
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  spark:
    build:
      context: .
      dockerfile: docker/Dockerfile-spark
    container_name: spark
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=crypto-market
      - OUTPUT_PATH=/data/features
      - CHECKPOINT_PATH=/data/checkpoints/sentinel
    volumes:
      - features-data:/data/features
      - checkpoint-data:/data/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "4040:4040"
    command: >
      spark-submit
        --class com.sentinel.streaming.CryptoStreamJob
        --master local[*]
        --conf spark.sql.streaming.stateStore.minDeltasForSnapshot=1
        --conf spark.driver.extraJavaOptions=-Dlog4j.logger.org.apache.spark.sql.execution.streaming.state=ERROR
        /opt/spark-apps/app.jar
    healthcheck:
      test: ["CMD-SHELL", "find /data/features -name '*.parquet' | head -1 | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # --- ML Training ---

  ml-training:
    build:
      context: .
      dockerfile: docker/Dockerfile-ml
    container_name: ml-training
    environment:
      - FEATURES_PATH=/data/features
      - MODEL_PATH=/models/isolation_forest.joblib
      - MIN_PARQUET_FILES=3
      - CHECK_INTERVAL_SECONDS=15
      - MAX_WAIT_SECONDS=600
    volumes:
      - features-data:/data/features:ro
      - model-data:/models
    depends_on:
      spark:
        condition: service_healthy
      data-generator:
        condition: service_started
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # --- API & Dashboard ---

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile-api
    container_name: api
    environment:
      - MODEL_PATH=/models/isolation_forest.joblib
    volumes:
      - model-data:/models:ro
    ports:
      - "8000:8000"
    depends_on:
      - ml-training
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile-dashboard
    container_name: dashboard
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
